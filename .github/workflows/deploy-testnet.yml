name: Deploy to Testnet

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deployments.
concurrency:
  group: deploy-testnet
  cancel-in-progress: false

env:
  WASM_OPT_PATH: target/wasm32v1-none/release/chainsetttle.optimized.wasm
  NETWORK: testnet

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Only run after all CI checks pass on push to main.
    # workflow_dispatch bypasses this check intentionally.
    permissions:
      statuses: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deploy-

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build and optimize WASM
        run: |
          stellar contract build
          stellar contract optimize --wasm target/wasm32v1-none/release/chainsetttle.wasm

      - name: Restore deployer key
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: |
          # Write the secret key to a temp file; stellar-cli reads it via --source-account.
          # The key is never echoed to stdout.
          stellar keys add deployer --secret-key <<< "$DEPLOYER_SECRET_KEY"

      - name: Deploy to testnet
        id: deploy
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm "$WASM_OPT_PATH" \
            --source deployer \
            --network "$NETWORK" \
            2>&1)

          # Validate the output looks like a contract ID (56-char uppercase).
          if ! echo "$CONTRACT_ID" | grep -qE '^C[A-Z2-7]{55}$'; then
            echo "::error::Deployment failed or returned unexpected output"
            echo "Output: $CONTRACT_ID"
            exit 1
          fi

          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed contract ID: $CONTRACT_ID"

      - name: Post contract ID as commit status
        uses: actions/github-script@v7
        with:
          script: |
            const contractId = '${{ steps.deploy.outputs.contract_id }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: `Testnet contract: ${contractId}`,
              context: 'deploy/testnet',
              target_url: `https://stellar.expert/explorer/testnet/contract/${contractId}`,
            });

      - name: Write deploy output
        run: |
          echo "CONTRACT_ID=${{ steps.deploy.outputs.contract_id }}" >> "$GITHUB_ENV"
          echo "Testnet contract ID: ${{ steps.deploy.outputs.contract_id }}"
