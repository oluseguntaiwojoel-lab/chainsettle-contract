name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  WASM_PATH: target/wasm32v1-none/release/chainsetttle.wasm
  WASM_SIZE_LIMIT: 65536

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --all

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      wasm-path: ${{ env.WASM_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM
        run: stellar contract build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: chainsetttle-wasm
          path: ${{ env.WASM_PATH }}
          retention-days: 7

  size-check:
    name: Size Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: chainsetttle-wasm
          path: target/wasm32v1-none/release/

      - name: Check WASM size
        run: |
          SIZE=$(wc -c < "$WASM_PATH")
          echo "WASM size: ${SIZE} bytes (limit: ${WASM_SIZE_LIMIT} bytes)"
          if [ "$SIZE" -gt "$WASM_SIZE_LIMIT" ]; then
            echo "::error::WASM size ${SIZE} bytes exceeds the 64KB Soroban limit (${WASM_SIZE_LIMIT} bytes)"
            exit 1
          fi
          echo "✓ WASM size ${SIZE} bytes is within the 64KB limit"
